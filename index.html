<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.typekit.net/knf2zgc.css">
    <title>Ephemeral</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: #000;
        }

        body {
            font-family: "sloop-script-three", sans-serif;
            font-weight: 400;
            font-style: normal;

            color: #fff;
            overflow-x: hidden;
        }

        /* Scroll spacer — gives us scroll distance to drive the animation */
        #scroll-spacer {
            height: 300vh;
        }

        /* ── Fixed background video ─────────────────────────────────────── */
        #bg-video {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        #bg-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05);
        }

        /* ── SVG logo — positioned entirely by JS ───────────────────────── */
        #svg-logo {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            will-change: width, top, left;
        }

        /* ── Product section ────────────────────────────────────────────── */
        #product-section {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            padding-top: 30px;
            /* clear the logo at the top */
        }

        .img-perspective {
            perspective: 1400px;
        }

        #ephemeral-img {
            display: block;
            width: clamp(180px, 32vw, 420px);
            animation: spinY 6s linear infinite;
            will-change: transform;
        }

        @keyframes spinY {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        /* ── Purchase button ────────────────────────────────────────────── */
        .purchase-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 14px 56px;
            color: #fff;
            font-size: 5rem;
            letter-spacing: 0rem;
            text-decoration: none;
            font-family: inherit;
            background: transparent;
            cursor: pointer;
            opacity: 1;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .purchase-btn:hover {
            background: rgba(255, 255, 255);
            color: #000;
            border-color: transparent;
        }
    </style>
</head>

<body>

    <!-- Drives scroll distance for the animation -->
    <div id="scroll-spacer"></div>

    <!-- Fixed background video -->
    <div id="bg-video">
        <video autoplay muted loop playsinline>
            <source src="Ephemeral%20Website%20Video.mov" type="video/mp4">
            <source src="Ephemeral%20Website%20Video.mov" type="video/quicktime">
        </video>
    </div>

    <!-- SVG logo — starts centered/large, shrinks to top as you scroll -->
    <img id="svg-logo" src="ephemeral%20svg.svg" alt="Ephemeral">

    <!-- Product section — fades in once SVG has settled at top -->
    <section id="product-section">
        <div class="img-perspective">
            <img id="ephemeral-img" src="ephemeral.png" alt="Ephemeral">
        </div>
        <a href="#purchase" class="purchase-btn">Purchase</a>
    </section>

    <script>
        const svgLogo = document.getElementById('svg-logo');
        const productSection = document.getElementById('product-section');

        // SVG intrinsic aspect ratio from viewBox "0 0 3508 2481"
        const SVG_ASPECT = 2481 / 3508; // height ÷ width ≈ 0.707

        // ── Easing ──────────────────────────────────────────────────────────
        function easeInOutCubic(t) {
            return t < 0.5
                ? 4 * t * t * t
                : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }
        function lerp(a, b, t) { return a + (b - a) * t; }

        // ── Main update ─────────────────────────────────────────────────────
        function update() {
            const scrollY = window.scrollY;
            const vh = window.innerHeight;
            const vw = window.innerWidth;

            // Phase 1 (0 → 1 viewport height): SVG shrinks from hero to nav logo
            const phase1Raw = clamp(scrollY / vh, 0, 1);
            const phase1 = easeInOutCubic(phase1Raw);

            // Phase 2 (1vh → 1.5vh): product section fades in
            const phase2 = clamp((scrollY - vh) / (vh * 0.5), 0, 1);

            // ── SVG sizing ──────────────────────────────────────────────────
            const initialWidth = vw * 0.8;
            const initialHeight = initialWidth * SVG_ASPECT;
            const finalWidth = vw * 0.2;

            const svgWidth = lerp(initialWidth, finalWidth, phase1);
            const svgHeight = svgWidth * SVG_ASPECT;

            // ── SVG position ────────────────────────────────────────────────
            // Always centered horizontally
            const svgLeft = (vw - svgWidth) / 2;

            // Vertical: from screen-center to 14px from top
            const initialTop = (vh - initialHeight) / 2;
            const finalTop = -10;
            const svgTop = lerp(initialTop, finalTop, phase1);

            svgLogo.style.width = svgWidth + 'px';
            svgLogo.style.left = svgLeft + 'px';
            svgLogo.style.top = svgTop + 'px';

            // ── Product section ─────────────────────────────────────────────
            productSection.style.opacity = phase2;
            productSection.style.pointerEvents = phase2 > 0.05 ? 'all' : 'none';
        }

        // Run immediately + on every scroll / resize
        update();
        window.addEventListener('scroll', update, { passive: true });
        window.addEventListener('resize', update, { passive: true });
    </script>

</body>

</html>
